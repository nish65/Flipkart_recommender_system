apiVersion: apps/v1
kind: Deployment
metadata: 
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      labels:
        app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-Service
  namespace: monitoring
spec:
  selector:
    app: grafana
  type: LoadBalancer
  ports:
    - protocal: TCP
      port: 3000
      nodeport: 3000
    